name: Daily Study Reminder

on:
  schedule:
    # UTC 时间，北京时间 07:30 = UTC 23:30 (前一天)
    - cron: '30 23 * * *'
  workflow_dispatch:  # 手动触发（测试用）

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send notifications
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          STUDY_CONFIG_OVERRIDE: "true"
        run: |
          cd ai-study-cli
          python -c "
          import json, os

          # 在 CI 中用环境变量覆盖 config
          config_path = 'data/config.json'
          config = {}
          if os.path.exists(config_path):
              with open(config_path, 'r', encoding='utf-8') as f:
                  config = json.load(f)

          # 环境变量覆盖敏感信息
          if os.environ.get('PUSHPLUS_TOKEN'):
              config['pushplus_token'] = os.environ['PUSHPLUS_TOKEN']
          if os.environ.get('FEISHU_WEBHOOK'):
              config['feishu_webhook'] = os.environ['FEISHU_WEBHOOK']

          with open(config_path, 'w', encoding='utf-8') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          "

          python study.py notify
