name: Daily Study Reminder

on:
  schedule:
    # UTC 时间，北京时间 08:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发（测试用）

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || true

      - name: Setup config and send notifications
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_NOTES_REPO: ${{ secrets.GITHUB_NOTES_REPO }}
          STUDY_START_DATE: ${{ secrets.STUDY_START_DATE }}
          JOB_START_DATE: ${{ secrets.JOB_START_DATE }}
        run: |
          python -c "
          import json, os
          from datetime import datetime

          config = {
              'pushplus_token': os.environ.get('PUSHPLUS_TOKEN', ''),
              'feishu_webhook': os.environ.get('FEISHU_WEBHOOK', ''),
              'feishu_secret': '',
              'telegram_bot_token': os.environ.get('TELEGRAM_BOT_TOKEN', ''),
              'telegram_chat_id': os.environ.get('TELEGRAM_CHAT_ID', ''),
              'github_token': os.environ.get('GITHUB_TOKEN', ''),
              'github_notes_repo': os.environ.get('GITHUB_NOTES_REPO', ''),
              'job_start_date': os.environ.get('JOB_START_DATE', '2026-07-06'),
              'start_date': os.environ.get('STUDY_START_DATE', '2026-04-13'),
              'remind_time': '08:00',
              'initialized': True,
          }

          os.makedirs('data', exist_ok=True)
          with open('data/config.json', 'w', encoding='utf-8') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)

          # 生成 progress.json（根据 start_date 自动算天数）
          start = datetime.strptime(config['start_date'], '%Y-%m-%d')
          today = datetime.now()
          day = max(1, (today - start).days + 1)
          progress = {
              'start_date': config['start_date'],
              'current_day': day,
              'completed_tasks': [],
              'skipped_tasks': [],
              'daily_logs': {},
              'quiz_history': [],
              'streak': 0,
              'max_streak': 0,
              'total_completed': 0,
          }
          with open('data/progress.json', 'w', encoding='utf-8') as f:
              json.dump(progress, f, ensure_ascii=False, indent=2)

          print(f'Config ready. Day {day}.')
          "

          python study.py notify
